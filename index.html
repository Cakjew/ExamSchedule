<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <link rel="shortcut icon" href="./favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择页面</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --accent: #3b82f6;
            --accent-strong: #2563eb;
            --surface: rgba(20, 24, 31, 0.74);
            --surface-strong: rgba(255, 255, 255, 0.08);
            --text: #f5f7fb;
            --muted: #a3b0c2;
        }

        body {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.18), transparent 40%), linear-gradient(320deg, rgba(8, 15, 24, 0.98), rgba(14, 20, 29, 0.96));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', 'Google Sans', 'Roboto', sans-serif;
            color: var(--text);
            backdrop-filter: blur(12px);
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 32%);
            pointer-events: none;
        }

        h1 {
            display: none;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            gap: 24px;
            animation: fadeInUp 1s ease-in-out;
            width: 100%;
            max-width: 860px;
            flex-wrap: wrap;
        }

        ul a {
            color: var(--text);
            text-decoration: none;
            font-size: 20px;
            font-weight: 600;
            padding: 28px 24px;
            border-radius: 24px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04));
            border: 1px solid rgba(255,255,255,0.12);
            transition: all 0.25s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            min-width: 220px;
            text-align: center;
            min-height: 150px;
            flex: 1;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(18px);
        }

        ul a:hover {
            background: linear-gradient(145deg, rgba(59,130,246,0.2), rgba(255,255,255,0.06));
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 22px 46px rgba(59, 130, 246, 0.18);
            color: #dfeeff;
            border-color: rgba(59, 130, 246, 0.35);
        }

        ul .material-icons,
        ul .material-symbols-outlined {
            font-size: 32px;
            color: #8ec5ff;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .copyright {
            position: absolute;
            bottom: 16px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #8ec5ff;
            animation: fadeInUp 1s ease-in-out;
        }

        .github-link {
            position: static;
            background: rgba(255,255,255,0.08);
            padding: 8px 16px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 10px 24px rgba(0,0,0,0.12);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .github-link:hover {
            background: rgba(59,130,246,0.2);
            color: #fff;
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.18);
        }

        .github-link .material-symbols-outlined {
            font-size: 18px;
            color: #8ec5ff;
            transition: color 0.2s;
        }

        .github-link:hover .material-symbols-outlined {
            color: #fff;
        }

        .project-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            animation: fadeInUp 1s ease-in-out;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            padding: 10px 20px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(16px);
        }

        .project-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .material-icons,
        .material-symbols-outlined {
            font-size: 20px;
        }

        .top-right-links {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .about-link {
            background-color: transparent;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 14px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s, color 0.2s;
        }

        .about-link:hover {
            background-color: rgba(255,255,255,0.08);
            color: #8ec5ff;
        }

        .about-link .material-icons,
        .about-link .material-symbols-outlined {
            font-size: 18px;
            color: #8ec5ff;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-top: 4px;
            width: 100%;
            text-align: center;
        }

        #announcement-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            inset: 0;
            background: rgba(6, 10, 17, 0.45);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        #announcement-modal.show {
            display: flex;
            animation: fadeInOverlay 0.35s ease both;
        }

        #announcement-modal.closing {
            animation: fadeOutOverlay 0.25s ease both;
        }

        #announcement-modal .announcement-card {
            background: #111827;
            color: var(--text);
            border-radius: 24px;
            max-width: 90vw;
            min-width: 320px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.24);
            padding: 28px 24px 18px 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: popUp 0.35s cubic-bezier(0.2, 0, 0, 1.0) both;
            transform-origin: center bottom;
        }

        #announcement-modal .announcement-card > span {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #8ec5ff;
        }

        #announcement-modal .announcement-card #announcement-content {
            font-size: 16px;
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.6;
            opacity: 0.96;
        }

        #announcement-modal .announcement-card button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        #announcement-modal .announcement-card button:hover {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        @keyframes fadeInOverlay {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeOutOverlay {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        @keyframes popUp {
            from {
                transform: translateY(16px) scale(0.98);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes popDown {
            from {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            to {
                transform: translateY(16px) scale(0.96);
                opacity: 0;
            }
        }

        #announcement-modal.closing .announcement-card {
            animation: popDown 0.25s ease both;
        }
    </style>
</head>

<body>
    <div class="project-title">
        <img src="./icon.png" alt="ExamSchedule Logo" class="project-logo">
        ExamSchedule
    </div>
    <ul>
        <li><a href="./time/"><span class="material-symbols-outlined">schedule</span>电子钟表</a></li>
        <li><a href="./exam/"><span class="material-symbols-outlined">dashboard</span>考试信息
                <div class="subtitle">看板 & 广播</div>
            </a></li>
    </ul>

    <div class="top-right-links">
        <a href="./about/" class="about-link">
            <span class="material-symbols-outlined">info</span>
            关于
        </a>
        <a href="https://github.com/Cakjew/ExamSchedule" target="_blank" class="github-link">
            <span class="material-symbols-outlined" title="在GitHub上查看源代码">code</span>
        </a>
        <span id="ntp-status" style="margin-left:12px; font-size:13px; color:#999">TimeAPI: init</span>
    </div>

    <div class="copyright">&copy; 2024-2025 ExamAware开发团队 版权所有</div>
    

    <!-- 公告弹窗 -->
    <div id="announcement-modal">
        <div class="announcement-card">
            <span>公告</span>
            <div id="announcement-content"></div>
            <button id="announcement-close">关闭</button>
        </div>
    </div>

    <script src="exam/Scripts/ntp.js"></script>
    <script>
        const announcementModal = document.getElementById('announcement-modal');
        const announcementClose = document.getElementById('announcement-close');

        function showAnnouncement() {
            announcementModal.classList.remove('closing');
            announcementModal.classList.add('show');
        }

        function hideAnnouncement() {
            announcementModal.classList.add('closing');
            announcementModal.classList.remove('show');
            announcementModal.addEventListener('animationend', function handleClose() {
                announcementModal.classList.remove('closing');
                announcementModal.style.display = 'none';
                announcementModal.removeEventListener('animationend', handleClose);
            });
        }

        // 公告弹窗逻辑
        fetch('./announcement.json')
            .then(res => {
                if (!res.ok) throw new Error('No announcement');
                return res.json();
            })
            .then(data => {
                if (data && data.show && data.content) {
                    document.getElementById('announcement-content').innerHTML = data.content;
                    announcementModal.style.display = 'flex';
                    showAnnouncement();
                }
            })
            .catch(() => {});

        announcementClose.onclick = hideAnnouncement;
    </script>
    <script src="browser-warning.js"></script>
</body>

</html>
